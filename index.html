<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tasks</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230f0f10'/><rect x='7' y='15' width='12' height='12' rx='3' fill='none' stroke='%23c5f082' stroke-width='1.8'/><path d='M11 21l2.5 2.5L18 18' stroke='%23c5f082' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'/><path d='M13 10h10M13 14h7' stroke='%237b7a75' stroke-width='1.8' stroke-linecap='round'/></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./todo.css" />
    <script>
      window.va =
        window.va ||
        function () {
          (window.vaq = window.vaq || []).push(arguments);
        };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div class="header-meta" id="dateChip"></div>
        <h1>My Tasks</h1>
        <div class="progress-track">
          <div class="progress-fill" id="progressBar"></div>
        </div>
        <div class="stats-row">
          <span><b id="countIn">0</b> remaining</span>
          <span><b id="countCo">0</b> done</span>
        </div>
      </header>

      <form class="add-form" novalidate>
        <input
          type="text"
          id="text"
          name="task"
          placeholder="Add a new task…"
          autocomplete="off"
          required
        />
        <button type="submit" aria-label="Add task">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path
              d="M8 2v12M2 8h12"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
        </button>
      </form>

      <section class="task-section">
        <div class="section-head">
          <span class="section-label">In progress</span>
        </div>
        <ul id="pendingLists"></ul>
        <p class="empty-hint" id="emptyPending">
          Nothing here — you're all clear!
        </p>
      </section>

      <section class="task-section">
        <div class="section-head">
          <span class="section-label">Completed</span>
          <button type="button" id="btn">Clear all</button>
        </div>
        <ul id="completeLists"></ul>
        <p class="empty-hint" id="emptyComplete">Completed tasks appear here</p>
      </section>

      <footer class="app-footer">
        <span>Built by Rubayed Ahmed Foysal</span>
        <a
          href="https://github.com/git-rubayedFoysal"
          target="_blank"
          rel="noopener noreferrer"
          class="footer-link"
        >
          <svg
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"
            />
          </svg>
          git-rubayedFoysal
        </a>
      </footer>
    </div>

    <script src="./todo.js"></script>

    <!-- Vercel Speed Insights -->
    <script>
      window.si =
        window.si ||
        function () {
          (window.siq = window.siq || []).push(arguments);
        };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
  </body>
</html>
